                                                            }}
                                                            class="${appTheme === 'light' ? 'bg-white text-slate-900 border-slate-200 focus:border-blue-500' : 'bg-slate-800 text-white border-slate-700 focus:border-blue-500'} border rounded-lg px-3 py-1.5 text-sm font-bold outline-none w-full placeholder:text-slate-400"
                                                        />
                                                        <div class="text-xs ${appTheme === 'light' ? 'text-slate-600' : 'text-slate-400'} font-mono break-all line-clamp-2" title=${m.content}>
                                                            ${m.content || html`<span class="text-slate-400 italic">Empty</span>`}
                                                        </div>
                                                    </div>
                                                `)}
                                            </div>
                                        `}
                                    </div>
                                </div>
                            </div>
                            `;
                        })()}
                    `}

                    ${exportModalDevId && devices.find(d => d.id === exportModalDevId) && html`
                        ${(() => {
                            const dev = devices.find(d => d.id === exportModalDevId);
                            return html`
                            <div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm" onClick=${() => !isExporting && setExportModalDevId(null)}>
                                <div class="${appTheme === 'light' ? 'bg-white' : 'bg-slate-900'} border ${appTheme === 'light' ? 'border-slate-200' : 'border-slate-700'} rounded-2xl shadow-2xl max-w-md w-full mx-4 flex flex-col" onClick=${(e) => e.stopPropagation()}>
                                    <div class="px-6 py-4 border-b ${appTheme === 'light' ? 'border-slate-100' : 'border-slate-800'} flex justify-between items-center">
                                        <h3 class="text-lg font-black ${appTheme === 'light' ? 'text-slate-900' : 'text-white'} uppercase tracking-wide">Export Image</h3>
                                        <button onClick=${() => !isExporting && setExportModalDevId(null)} class="text-slate-500 hover:text-blue-500 transition-colors text-xl font-bold" disabled=${isExporting}>✕</button>
                                    </div>
                                    <div class="px-6 py-5 space-y-6">
                                        <div>
                                            <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Layers to Export</h4>
                                            <div class="flex gap-3">
                                                ${(() => {
                                                    const layers = dev.keymapJson?.layers || dev.design?.layers;
                                                    const layerCount = layers?.length || 4;
                                                    return Array.from({ length: layerCount }, (_, l) => html`
                                                        <label key=${l} class="flex items-center gap-2 cursor-pointer ${isExporting ? 'opacity-50 pointer-events-none' : ''}">
                                                            <input type="checkbox" checked=${exportSettings.layers.includes(l)} onChange=${() => {
                                                                const newLayers = exportSettings.layers.includes(l) ? exportSettings.layers.filter(x => x !== l) : [...exportSettings.layers, l].sort();
                                                                setExportSettings(s => ({ ...s, layers: newLayers }));
                                                            }} class="w-4 h-4 rounded bg-slate-800 border-slate-600 text-blue-500" />
                                                            <span class="text-sm font-bold text-slate-300">L${l}</span>
                                                        </label>
                                                    `);
                                                })()}
                                            </div>
                                        </div>
                                        <div>
                                            <label class="flex items-center gap-2 cursor-pointer ${isExporting ? 'opacity-50 pointer-events-none' : ''}">
                                                <input type="checkbox" checked=${exportSettings.includeMacros} onChange=${(e) => setExportSettings(s => ({ ...s, includeMacros: e.target.checked }))} class="w-4 h-4 rounded bg-slate-800 border-slate-600 text-blue-500" />
                                                <span class="text-sm font-bold text-slate-300">Include Macro List</span>
                                            </label>
                                        </div>
                                        <div>
                                            <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Background</h4>
                                            <div class="flex gap-4">
                                                ${['Dark', 'Light', 'Transparent'].map(bg => html`
                                                    <label class="flex items-center gap-2 cursor-pointer ${isExporting ? 'opacity-50 pointer-events-none' : ''}">
                                                        <input type="radio" name="export-bg" checked=${exportSettings.background === bg} onChange=${() => setExportSettings(s => ({ ...s, background: bg }))} class="w-4 h-4 bg-slate-800 border-slate-600 text-blue-500" />
                                                        <span class="text-sm font-bold text-slate-300">${bg}</span>
                                                    </label>
                                                `)}
                                            </div>
                                        </div>
                                        <button 
                                            onClick=${() => handleExportClick(dev)} 
                                            disabled=${isExporting || exportSettings.layers.length === 0}
                                            class="w-full py-3 rounded-xl font-black uppercase tracking-widest transition-all ${isExporting || exportSettings.layers.length === 0 ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-900/50'}"
                                        >
                                            ${isExporting ? 'Generating PNG...' : 'Download PNG'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                            `;
                        })()}
                    `}

                    ${isExporting && exportModalDevId && devices.find(d => d.id === exportModalDevId) && html`
                        ${(() => {
                            const dev = devices.find(d => d.id === exportModalDevId);
                            const isLight = exportSettings.background === 'Light' || (exportSettings.background === 'System' && dev.theme === 'Light');
                            const isTrans = exportSettings.background === 'Transparent';
                            const bgClass = isTrans ? 'bg-transparent' : (isLight ? 'bg-slate-100' : 'bg-[#020617]');
                            const textClass = isLight ? 'text-slate-900' : 'text-slate-100';
                            
                            return html`
                            <div style=${{ position: 'fixed', top: 0, left: 0, width: 0, height: 0, overflow: 'hidden', zIndex: -1000, pointerEvents: 'none' }}>
                                <div id="export-container" class="p-12 flex flex-col gap-16 ${bgClass} ${textClass}" style=${{ width: 'fit-content', minWidth: '1000px' }}>
                                    <div class="text-4xl font-black uppercase tracking-widest text-center opacity-90">${dev.name || 'Keymap'}</div>
                                    ${exportSettings.layers.map(l => html`
                                        <div key=${l} class="flex flex-col gap-8 items-center">
                                            <div class="text-2xl font-bold opacity-50 uppercase tracking-widest border-b-4 border-current pb-2 px-12">Layer ${l}</div>
                                            <${Keyboard} 
                                                design=${dev.design} 
                                                layer=${l} 
                                                externalMap=${dev.keymapJson} 
                                                displayMode=${dev.displayMode}
                                                theme=${exportSettings.background === 'Transparent' ? dev.theme : exportSettings.background}
                                                macroAliases=${dev.macroAliases || {}}
                                                forcedScale=${1}
                                                isExportMode=${true}
                                            />
                                        </div>
                                    `)}
                                    ${exportSettings.includeMacros && dev.keymapJson?.macros ? html`
                                        <div class="mt-8 flex flex-col gap-4 w-full px-12 pb-12">
                                            <div class="text-2xl font-bold opacity-50 uppercase tracking-widest border-b-4 border-current pb-2">Macros</div>
                                            <div class="grid grid-cols-[80px_200px_1fr] gap-4 text-base border-b-2 border-current pb-2 font-black opacity-70 uppercase tracking-widest">
                                                <div>ID</div><div>Alias</div><div>Content</div>
                                            </div>
                                            ${dev.keymapJson.macros.map((m, idx) => m ? html`
                                                <div key=${idx} class="grid grid-cols-[80px_200px_1fr] gap-4 text-base items-center py-8 border-b border-current/20">
                                                    <div class="flex justify-start">
                                                        <div class="font-black text-blue-500 bg-blue-500/10 px-2 h-7 rounded flex items-center justify-center overflow-visible" style=${{ position: 'relative', top: '-13px', minWidth: '42px' }}>
                                                            <span style=${{ position: 'relative', top: '-9px' }}>M${idx}</span>
                                                        </div>
                                                    </div>
                                                    <div class="font-bold" style=${{ position: 'relative', top: '-21px' }}>${(dev.macroAliases || {})[idx] || '-'}</div>
                                                    <div class="font-mono opacity-80 break-all leading-tight" style=${{ position: 'relative', top: '-21px' }}>${m}</div>
                                                </div>
                                            ` : null)}
                                        </div>
                                    ` : null}
                                </div>
                            </div>
                            `;
                        })()}
                    `}

                    <main class="flex-1 flex flex-col gap-8">
                        <div class="grid gap-8 ${layoutMode === 'grid' ? 'grid-cols-1 lg:grid-cols-2' : 'grid-cols-1'}">
                            ${devices.map((dev, idx) => {
                                const isSlotLight = dev.theme === 'Light' || (dev.theme === 'System' && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches);
                                const isDragOver = dragOverTarget === dev.id;
                                return html`
                                <div key=${dev.id}
                                    draggable="true"
                                    onDragStart=${(e) => handleSlotDragStart(e, dev.id)}
                                    onDragEnd=${handleSlotDragEnd}
                                    onDragOver=${(e) => handleDragOver(e, dev.id)}
                                    onDragLeave=${handleDragLeave}
                                    onDrop=${(e) => handleDrop(e, dev.id)}
                                    class="relative flex flex-col ${appTheme === 'light' ? 'bg-white/80 border-slate-200 shadow-sm' : 'bg-slate-900/40 border-slate-800'} rounded-[2rem] border-2 transition-all p-6 ${
                                        isDragOver ? (appTheme === 'light' ? 'border-blue-400 bg-blue-50 scale-[1.01]' : 'border-blue-400 bg-blue-500/10 shadow-2xl shadow-blue-900/20 scale-[1.01]')
                                        : draggedSlotId === dev.id ? (appTheme === 'light' ? 'border-slate-100 opacity-50' : 'border-slate-700 opacity-50')
                                        : (appTheme === 'light' ? 'border-slate-200 hover:border-blue-200' : 'border-slate-800 hover:border-slate-700')
                                    }">
                                    ${isDragOver && html`
                                        <div class="absolute inset-0 rounded-[2rem] border-2 border-dashed border-blue-400/50 pointer-events-none z-10 flex items-center justify-center">
                                            <span class="text-blue-500/60 text-xs font-black uppercase tracking-widest">Drop here</span>
                                        </div>
                                    `}
                                    <!-- Header: Title and Controls -->
                                    <div class="flex justify-between items-start mb-4">
                                        <div class="flex flex-col gap-1">
                                            <div class="flex items-center gap-3">
                                                <span class="text-[10px] font-black px-2 py-0.5 rounded-md bg-blue-600 text-white uppercase cursor-grab active:cursor-grabbing">Slot ${idx + 1}</span>
                                                ${editingDeviceId === dev.id ? html`
                                                    <input
                                                        type="text"
                                                        value=${editingName}
                                                        onInput=${(e) => setEditingName(e.target.value)}
                                                        onBlur=${() => finishEditing(dev.id)}
                                                        onKeyDown=${(e) => { if (e.key === 'Enter') finishEditing(dev.id); if (e.key === 'Escape') setEditingDeviceId(null); }}
                                                        class="text-lg font-black ${appTheme === 'light' ? 'text-slate-900' : 'text-slate-100'} tracking-tight uppercase ${appTheme === 'light' ? 'bg-white' : 'bg-slate-800'} border border-blue-500 rounded-lg px-2 py-0.5 outline-none w-48"
                                                        ref=${(el) => el && el.focus()}
                                                    />
                                                ` : html`
                                                    <h2 class="text-lg font-black ${appTheme === 'light' ? 'text-slate-900' : 'text-slate-100'} tracking-tight uppercase">${dev.name || 'No Device'}</h2>
                                                    ${dev.name && html`
                                                        <button onClick=${(e) => { e.stopPropagation(); startEditing(dev); }} class="p-1 text-slate-400 hover:text-blue-400 transition-colors" title="Rename">
                                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path><path d="m15 5 4 4"></path></svg>
                                                        </button>
                                                    `}
                                                `}
                                            </div>
                                        </div>
                                        <div class="flex items-center gap-1">
                                            <button onClick=${(e) => { e.stopPropagation(); removeDevice(dev.id); }} class="p-2 text-slate-400 hover:text-red-400 transition-colors" title="Remove Slot">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                                            </button>
                                            <button onClick=${(e) => { e.stopPropagation(); updateDevice(dev.id, { showSettings: !dev.showSettings }); }} class="p-2 text-slate-400 hover:text-blue-400 transition-colors ${dev.showSettings ? 'text-blue-400 bg-blue-500/10 rounded-lg' : ''}" title="Display Settings">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                                            </button>
                                        </div>
                                    </div>

                                    <!-- Action Toolbar -->
                                    <div class="flex flex-wrap items-center gap-2 mb-6 p-2 ${appTheme === 'light' ? 'bg-slate-100/50' : 'bg-slate-950/30'} rounded-xl border ${appTheme === 'light' ? 'border-slate-200' : 'border-slate-800/50'}">
                                        <label class="flex-1 min-w-[100px] ${appTheme === 'light' ? 'bg-white/80 hover:bg-white text-slate-700 shadow-sm' : 'bg-slate-800/40 backdrop-blur-sm hover:bg-slate-700/60 text-slate-200'} px-3 py-2 rounded-lg text-[10px] font-black cursor-pointer transition-all uppercase tracking-widest border ${appTheme === 'light' ? 'border-slate-200' : 'border-slate-700/50'} flex items-center justify-center">
                                            LAYOUT <input type="file" class="hidden" onChange=${(e) => handleFile(e, dev.id, 'layout')} />
                                        </label>
                                        <label class="flex-1 min-w-[100px] ${appTheme === 'light' ? 'bg-white/80 hover:bg-white text-slate-700 shadow-sm' : 'bg-slate-800/40 backdrop-blur-sm hover:bg-slate-700/60 text-slate-200'} px-3 py-2 rounded-lg text-[10px] font-black cursor-pointer transition-all uppercase tracking-widest border ${appTheme === 'light' ? 'border-slate-200' : 'border-slate-700/50'} flex items-center justify-center">
                                            MAPPING <input type="file" class="hidden" onChange=${(e) => handleFile(e, dev.id, 'mapping')} />
                                        </label>
                                        <button onClick=${(e) => { e.stopPropagation(); setMacroModalState({ deviceId: dev.id, macroId: null }); }} class="flex-1 min-w-[80px] ${appTheme === 'light' ? 'bg-white/80 hover:bg-white text-slate-700 shadow-sm' : 'bg-slate-800/40 backdrop-blur-sm hover:bg-slate-700/60 text-slate-200'} px-3 py-2 rounded-lg text-[10px] font-black cursor-pointer transition-all uppercase tracking-widest border ${appTheme === 'light' ? 'border-slate-200' : 'border-slate-700/50'} flex items-center justify-center">
                                            MACROS
                                        </button>
                                        <button onClick=${(e) => { e.stopPropagation(); setExportModalDevId(dev.id); setExportSettings({ layers: [dev.layer], includeMacros: true, background: dev.theme || 'Dark' }); }} class="flex-1 min-w-[80px] ${appTheme === 'light' ? 'bg-blue-50 hover:bg-blue-100 text-blue-600' : 'bg-blue-600/20 backdrop-blur-sm hover:bg-blue-600/40 text-blue-400'} px-3 py-2 rounded-lg text-[10px] font-black cursor-pointer transition-all uppercase tracking-widest border ${appTheme === 'light' ? 'border-blue-200' : 'border-blue-500/30'} flex items-center justify-center">
                                            EXPORT
                                        </button>
                                    </div>

                                    <div class="flex flex-col items-center justify-center">
                                        ${dev.design ? html`
                                            <div class="w-full flex flex-col items-center gap-6">
                                                <div class="flex flex-col gap-4 w-full">
                                                    <div class="flex items-center gap-4 ${appTheme === 'light' ? 'bg-white/80 border-slate-200 shadow-sm' : 'bg-slate-800/40 backdrop-blur-sm border-slate-700/50'} p-1.5 rounded-xl border self-start ml-2">
                                                        <span class="text-[9px] font-black ${appTheme === 'light' ? 'text-slate-400' : 'text-slate-400'} uppercase tracking-widest px-2">Layer</span>
                                                        ${(() => {
                                                            if (!dev) return null;
                                                            const layers = dev.keymapJson?.layers || dev.design?.layers;
                                                            const layerCount = layers?.length || 4;
                                                            const pageSize = 5;
                                                            const currentPage = dev.layerPage || 0;
                                                            
                                                            if (layerCount <= pageSize) {
                                                                return Array.from({ length: layerCount }, (_, l) => html`
                                                                    <button key=${l} onClick=${(e) => { e.stopPropagation(); updateDevice(dev.id, { layer: l }); }} class="w-8 h-8 rounded-lg font-bold text-[10px] transition-all ${dev.layer === l ? 'bg-blue-500 text-white shadow-[0_0_15px_rgba(59,130,246,0.4)]' : (appTheme === 'light' ? 'text-slate-400 hover:bg-slate-100 hover:text-slate-900' : 'text-slate-200 hover:bg-slate-700/50 hover:text-white')}">${l}</button>
                                                                `);
                                                            }
                                                            
                                                            const buttons = [];
                                                            const hasPrev = currentPage > 0;
                                                            const hasNext = (currentPage + 1) * (pageSize - 1) < layerCount - 1;
                                                            const startIdx = currentPage * (pageSize - 1);
                                                            const numToDisplay = pageSize - (hasPrev ? 1 : 0) - (hasNext ? 1 : 0);
                                                            const displayOffset = hasPrev ? startIdx + 1 : startIdx;

                                                            if (hasPrev) {
                                                                buttons.push(html`<button key="prev" onClick=${(e) => { e.stopPropagation(); updateDevice(dev.id, { layerPage: currentPage - 1 }); }} class="w-8 h-8 rounded-lg font-bold text-sm text-blue-500 ${appTheme === 'light' ? 'hover:bg-blue-50' : 'hover:bg-slate-700/50'} transition-all" style=${{ fontFamily: 'Segoe Fluent Icons' }}>${String.fromCharCode(0xE76B)}</button>`);
                                                            }
                                                            
                                                            for (let i = 0; i < numToDisplay; i++) {
                                                                const l = displayOffset + i;
                                                                if (l < layerCount) {
                                                                    buttons.push(html`<button key=${l} onClick=${(e) => { e.stopPropagation(); updateDevice(dev.id, { layer: l }); }} class="w-8 h-8 rounded-lg font-bold text-[10px] transition-all ${dev.layer === l ? 'bg-blue-500 text-white shadow-[0_0_15px_rgba(59,130,246,0.4)]' : (appTheme === 'light' ? 'text-slate-400 hover:bg-slate-100 hover:text-slate-900' : 'text-slate-200 hover:bg-slate-700/50 hover:text-white')}">${l}</button>`);
                                                                }
                                                            }
                                                            
                                                            if (hasNext) {
                                                                buttons.push(html`<button key="next" onClick=${(e) => { e.stopPropagation(); updateDevice(dev.id, { layerPage: currentPage + 1 }); }} class="w-8 h-8 rounded-lg font-bold text-sm text-blue-500 ${appTheme === 'light' ? 'hover:bg-blue-50' : 'hover:bg-slate-700/50'} transition-all" style=${{ fontFamily: 'Segoe Fluent Icons' }}>${String.fromCharCode(0xE76C)}</button>`);
                                                            }
                                                            
                                                            return buttons;
                                                        })()}
                                                    </div>

                                                    ${dev.showSettings && html`
                                                        <div class="flex flex-wrap items-center gap-4 ${appTheme === 'light' ? 'bg-white/90 border-slate-200' : 'bg-slate-900/80 border-slate-700'} p-4 rounded-xl border w-full">
                                                            <div class="flex items-center gap-4 ${appTheme === 'light' ? 'bg-slate-50' : 'bg-slate-950/30'} p-2 px-4 rounded-xl border ${appTheme === 'light' ? 'border-slate-200' : 'border-slate-800/50'}">
                                                                <span class="text-[9px] font-black ${appTheme === 'light' ? 'text-slate-400' : 'text-slate-600'} uppercase tracking-widest">DISPLAY MODE:</span>
                                                                <div class="flex gap-4">
                                                                    ${['Fluent', 'Text'].map(opt => html`
                                                                        <label class="flex items-center gap-1.5 cursor-pointer group">
                                                                            <input type="radio" name=${`displayMode-${dev.id}`} checked=${dev.displayMode === opt} onChange=${() => updateDevice(dev.id, { displayMode: opt })} class="hidden" />
                                                                            <div class="w-3 h-3 rounded-full border ${appTheme === 'light' ? 'border-slate-300' : 'border-slate-600'} flex items-center justify-center ${dev.displayMode === opt ? 'border-blue-500' : ''}">
                                                                                ${dev.displayMode === opt && html`<div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>`}
                                                                            </div>
                                                                            <span class="text-[9px] font-bold ${dev.displayMode === opt ? (appTheme === 'light' ? 'text-slate-900' : 'text-white') : 'text-slate-500'} uppercase">${opt}</span>
                                                                        </label>
                                                                    `)}
                                                                </div>
                                                            </div>

                                                            

                                                            <div class="flex items-center gap-4 ${appTheme === 'light' ? 'bg-slate-50' : 'bg-slate-950/30'} p-2 px-4 rounded-xl border ${appTheme === 'light' ? 'border-slate-200' : 'border-slate-800/50'}">
                                                                <span class="text-[9px] font-black ${appTheme === 'light' ? 'text-slate-400' : 'text-slate-600'} uppercase tracking-widest">THEME:</span>
                                                                <div class="flex gap-4">
                                                                    ${['Dark', 'Light', 'System'].map(opt => html`
                                                                        <label class="flex items-center gap-1.5 cursor-pointer group">
                                                                            <input type="radio" name=${`theme-${dev.id}`} checked=${(dev.theme || 'System') === opt} onChange=${() => updateDevice(dev.id, { theme: opt })} class="hidden" />
                                                                            <div class="w-3 h-3 rounded-full border ${appTheme === 'light' ? 'border-slate-300' : 'border-slate-600'} flex items-center justify-center ${(dev.theme || 'System') === opt ? 'border-blue-500' : ''}">
                                                                                ${(dev.theme || 'System') === opt && html`<div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>`}
                                                                            </div>
                                                                            <span class="text-[9px] font-bold ${(dev.theme || 'System') === opt ? (appTheme === 'light' ? 'text-slate-900' : 'text-white') : 'text-slate-500'} uppercase">${opt}</span>
                                                                        </label>
                                                                    `)}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    `}
                                                </div>
                                                <div class="w-full flex justify-center overflow-hidden mt-4">
                                                    <${Keyboard} 
                                                        design=${dev.design} 
                                                        layer=${dev.layer} 
                                                        externalMap=${dev.keymapJson} 
                                                        displayMode=${dev.displayMode}
                                                        theme=${dev.theme || 'System'}
                                                        appTheme=${appTheme}
                                                        macroAliases=${dev.macroAliases || {}}
                                                        onMacroClick=${(macroId) => setMacroModalState({ deviceId: dev.id, macroId })}
                                                    />
                                                </div>
                                            </div>
                                        ` : html`
                                            <div class="flex flex-col items-center gap-4 opacity-20 py-20">
                                                <div class="text-6xl">⌨️</div>
                                                <p class="text-[10px] font-black uppercase tracking-[0.3em]">Waiting for Layout</p>
                                            </div>
                                        `}
                                    </div>
                                </div>
                            `; })}
                        </div>
                        
                        ${devices.length < 4 && html`
                            <div
                                onClick=${addSlot}
                                onDragOver=${(e) => handleDragOver(e, 'add-slot')}
                                onDragLeave=${handleDragLeave}
                                onDrop=${(e) => handleDrop(e, null)}
                                class="w-full py-8 border-2 border-dashed rounded-[2rem] flex flex-col items-center gap-2 transition-all group cursor-pointer ${
                                    dragOverTarget === 'add-slot'
                                    ? 'border-blue-400 bg-blue-500/10 text-blue-400'
                                    : 'border-slate-800 text-slate-700 hover:border-slate-600 hover:text-slate-500'
                                }">
                                <div class="text-2xl group-hover:scale-125 transition-transform">+</div>
                                <div class="text-[10px] font-black uppercase tracking-[0.2em]">${dragOverTarget === 'add-slot' ? 'Drop JSON to add' : 'Add Slot'}</div>
                            </div>
                        `}
                    </main>

                    <footer class="mt-16 text-center text-[10px] font-bold ${appTheme === 'light' ? 'text-slate-400' : 'text-slate-600'} uppercase tracking-[0.2em] pb-10">
                        © 2026 Keymapping Viewer
                    </footer>
                </div>
            `;
        }

        createRoot(document.getElementById('root')).render(html`<${App} />`);
    </script>
</body>
</html>
