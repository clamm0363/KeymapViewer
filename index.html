<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keymap Viewer - QMK/VIA Keymap Visualizer</title>
    <meta name="description" content="A professional-grade web-based visualizer for QMK/VIA keyboard keymaps. High-precision rendering with Fluent System Icons.">
    <meta name="keywords" content="QMK, VIA, Keyboard, Keymap, Visualizer, Custom Keyboard">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/htm@3.1.1/dist/htm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* WebFont: Fluent System Icons (Regular) - Local & Fallback */
        @font-face {
            font-family: 'FluentSystemIcons-Regular';
            src: url('assets/fonts/FluentSystemIcons-Regular.woff2') format('woff2'),
                 url('https://cdn.jsdelivr.net/gh/microsoft/fluentui-system-icons/fonts/FluentSystemIcons-Regular.woff2') format('woff2');
            font-display: swap;
        }

        :root {
            --accent-color: #3b82f6;
        }
        body { 
            margin: 0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .app-dark { background-color: #020617; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 40px 40px; color: #f1f5f9; }
        .app-light { background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 40px 40px; color: #0f172a; }
        .key-cap { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; overflow: hidden; }
        .key-cap:hover { border-color: #3b82f6 !important; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1) !important; z-index: 50; }
        .key-cap:active { transform: translateY(0); }
        .kbd-container { position: relative; border-radius: 2rem; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .legend-text { white-space: normal; overflow: hidden; word-break: normal; overflow-wrap: anywhere; width: 100%; text-align: center; display: block; font-weight: 800; line-height: 1; max-height: 2.2em; }

        /* レイヤー操作キー専用スタイル */
        .key-layer-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            overflow: hidden;
            /* 親の overflow: hidden により適切にクリップされるため個別の指定は不要 */
        }
        .key-layer-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            color: inherit;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            line-height: 1;
            position: relative;
        }
        .key-layer-footer {
            height: 12px;
            background-color: var(--accent-color);
            color: #f8fafc; /* 高輝度ホワイト */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            overflow: hidden;
            box-sizing: border-box;
        }
        .key-layer-footer span {
            display: inline-block;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
            transform: scale(0.67);
            transform-origin: center;
            line-height: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
