<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Icon Test - Phase 1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .test-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fafafa;
        }
        .icon-preview {
            border: 2px solid #0078d4;
            padding: 20px;
            margin: 10px 0;
            border-radius: 4px;
            text-align: center;
            background: white;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-preview svg {
            width: 64px;
            height: 64px;
            color: #333;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-weight: bold;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 SVG Icon Test - Phase 1</h1>
        
        <div class="test-section">
            <h2>Test 1: SVG Module Import</h2>
            <div id="test1-result" class="status info">Loading...</div>
        </div>

        <div class="test-section">
            <h2>Test 2: DEBUG Icon SVG Rendering</h2>
            <div id="icon-container" class="icon-preview">
                <div id="svg-render">Loading SVG...</div>
            </div>
            <div id="test2-result" class="status info">Initializing...</div>
        </div>

        <div class="test-section">
            <h2>Test 3: WebFont Fallback</h2>
            <div id="icon-container-webfont" class="icon-preview" style="font-size: 48px; color: #1e293b;">
                <span id="webfont-fallback">Loading...</span>
            </div>
            <div id="test3-result" class="status info">Initializing...</div>
        </div>

        <div class="test-section">
            <h2>Test 4: Error Handling</h2>
            <div id="test4-result" class="status info">Testing error handling...</div>
        </div>

        <div class="test-section">
            <h2>Console Output</h2>
            <pre id="console-output" style="background: #1e1e1e; color: #d4d4d4; padding: 10px; border-radius: 4px; overflow-x: auto; max-height: 300px;"></pre>
        </div>
    </div>

    <script type="module">
        import { 
            SVG_ICONS, 
            createSVGElement, 
            isSVGAvailable, 
            getSVGFallback,
            listSVGIcons,
            debugSVGIcons
        } from './js/svg-icons.js';

        // Capture console output
        const consoleOutput = document.getElementById('console-output');
        const logs = [];
        
        const originalLog = console.log;
        const originalWarn = console.warn;
        const originalError = console.error;
        
        function addLog(level, ...args) {
            const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ');
            logs.push(`[${level}] ${msg}`);
            consoleOutput.textContent = logs.join('\n');
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
            originalLog(`[TEST ${level}]`, ...args);
        }
        
        window.console.log = (...args) => addLog('LOG', ...args);
        window.console.warn = (...args) => addLog('WARN', ...args);
        window.console.error = (...args) => addLog('ERROR', ...args);

        // Test 1: Module Import
        console.log('Test 1: Checking SVG module...');
        try {
            const icons = Object.keys(SVG_ICONS);
            console.log(`✓ SVG_ICONS loaded with ${icons.length} icon(s):`, icons);
            document.getElementById('test1-result').className = 'status success';
            document.getElementById('test1-result').textContent = `✓ Module imported successfully. Available icons: ${icons.join(', ')}`;
        } catch (e) {
            console.error('✗ Module import failed:', e);
            document.getElementById('test1-result').className = 'status error';
            document.getElementById('test1-result').textContent = `✗ Error: ${e.message}`;
        }

        // Test 2: SVG Rendering
        console.log('\nTest 2: Rendering DEBUG SVG icon...');
        try {
            const available = isSVGAvailable('DEBUG');
            console.log(`DEBUG icon available: ${available}`);
            
            if (available) {
                const svgEl = createSVGElement('DEBUG', { size: 64, color: '#1e293b' });
                if (svgEl) {
                    document.getElementById('svg-render').innerHTML = '';
                    document.getElementById('svg-render').appendChild(svgEl);
                    console.log('✓ SVG rendered successfully');
                    document.getElementById('test2-result').className = 'status success';
                    document.getElementById('test2-result').textContent = '✓ DEBUG SVG icon rendered successfully';
                } else {
                    console.error('✗ createSVGElement returned null');
                    document.getElementById('test2-result').className = 'status error';
                    document.getElementById('test2-result').textContent = '✗ SVG rendering returned null';
                }
            } else {
                console.warn('⚠ DEBUG icon not available in SVG_ICONS');
                document.getElementById('test2-result').className = 'status info';
                document.getElementById('test2-result').textContent = '⚠ DEBUG icon not configured as SVG';
            }
        } catch (e) {
            console.error('✗ SVG rendering error:', e);
            document.getElementById('test2-result').className = 'status error';
            document.getElementById('test2-result').textContent = `✗ Error: ${e.message}`;
        }

        // Test 3: WebFont Fallback
        console.log('\nTest 3: Testing WebFont fallback...');
        try {
            const fallback = getSVGFallback('DEBUG');
            if (fallback) {
                const style = `font-family: 'FluentSystemIcons-Regular', sans-serif; font-size: 48px;`;
                const span = document.getElementById('webfont-fallback');
                span.textContent = fallback;
                span.style = style;
                console.log(`✓ WebFont fallback rendered: ${fallback}`);
                document.getElementById('test3-result').className = 'status success';
                document.getElementById('test3-result').textContent = `✓ WebFont fallback working (code point: ${fallback.charCodeAt(0).toString(16).toUpperCase()})`;
            } else {
                console.warn('⚠ No fallback defined for DEBUG icon');
                document.getElementById('test3-result').className = 'status info';
                document.getElementById('test3-result').textContent = '⚠ No WebFont fallback configured';
            }
        } catch (e) {
            console.error('✗ WebFont fallback error:', e);
            document.getElementById('test3-result').className = 'status error';
            document.getElementById('test3-result').textContent = `✗ Error: ${e.message}`;
        }

        // Test 4: Error Handling
        console.log('\nTest 4: Testing error handling...');
        try {
            const nonExistent = createSVGElement('NONEXISTENT_ICON', { size: 64 });
            if (nonExistent === null) {
                console.log('✓ Non-existent icon returns null gracefully');
            }
            
            const invalidSize = createSVGElement('DEBUG', { size: -5 });
            // Should handle gracefully
            console.log('✓ Invalid parameters handled');
            
            document.getElementById('test4-result').className = 'status success';
            document.getElementById('test4-result').textContent = '✓ Error handling working correctly';
        } catch (e) {
            console.error('✗ Error handling failed:', e);
            document.getElementById('test4-result').className = 'status error';
            document.getElementById('test4-result').textContent = `✗ Unexpected error: ${e.message}`;
        }

        // Debug output
        console.log('\n=== Available Icons ===');
        debugSVGIcons();
        console.log('\n=== Test Complete ===');
    </script>
</body>
</html>
